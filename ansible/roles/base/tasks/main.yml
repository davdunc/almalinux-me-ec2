---
- name: Update all packages
  ansible.builtin.dnf:
    name: '*'
    state: latest
  when: base_full_update | bool

- name: Enable CRB repository
  community.general.dnf_config_manager:
    name: crb
    state: enabled

- name: Install EPEL release
  ansible.builtin.dnf:
    name: epel-release
    state: present

# After the repos: some core tools (htop, tmux) live in EPEL on EL10.
- name: Install core tooling
  ansible.builtin.dnf:
    name: "{{ base_packages }}"
    state: present

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
